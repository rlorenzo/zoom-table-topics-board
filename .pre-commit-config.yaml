repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: lizard
        name: lizard (complexity)
        entry: uv run lizard --CCN 10 --length 100 -w
        language: system
        types: [python]
        pass_filenames: true

      - id: mypy
        name: mypy (strict)
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false

      - id: pylint-duplicate-code
        name: pylint (duplicate-code)
        entry: uv run pylint --disable=all --enable=duplicate-code
        language: system
        types: [python]
        pass_filenames: false
        args: ["board.py", "tests"]

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        types: [python]
        pass_filenames: false

      - id: pip-audit
        name: pip-audit (dependency CVEs)
        entry: uv run pip-audit --skip-editable
        language: system
        pass_filenames: false
        stages: [pre-push]

      # --- Web tooling (HTML / CSS / JS) ---------------------------------
      # Rust-native binaries (biome, fallow) + html-validate, run through
      # pre-commit-managed node envs — no package.json / node_modules in the
      # repo. These stay dormant until the inline <script>/<style> in
      # index.html is extracted into app.js / styles.css; see
      # docs/web-tooling.md.
      - id: biome
        name: biome (js/css lint + format)
        entry: biome check --write --no-errors-on-unmatched
        language: node
        additional_dependencies: ["@biomejs/biome@2.4.16"]
        types_or: [javascript, jsx, ts, tsx, css]

      - id: html-validate
        name: html-validate (html structure / a11y)
        entry: html-validate
        language: node
        additional_dependencies: ["html-validate@11.5.2"]
        types: [html]

      - id: fallow
        name: fallow (dead code, duplication, complexity)
        entry: fallow audit --base main
        language: node
        additional_dependencies: ["fallow@2.88.3"]
        pass_filenames: false
        types_or: [javascript, jsx, ts, tsx]
        stages: [pre-push]

  - repo: https://github.com/jackdewinter/pymarkdown
    rev: v0.9.37
    hooks:
      - id: pymarkdown
        args: ["-d", "md013", "scan"]
